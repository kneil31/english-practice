<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>English Practice</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="wrap">
    <h1>English Practice</h1>
    <p class="sub">25 sessions with Coach Ann &middot; Frantically Speaking</p>
    <p class="updated" id="updated"></p>

    <section id="focus-section">
      <h2>Current Focus</h2>
      <div class="focus-card">
        <div class="focus-text" id="focus-text"></div>
      </div>
    </section>

    <section id="next-section">
      <h2>Next Session</h2>
      <div class="next-card">
        <div class="next-header">
          <span class="next-label" id="next-label"></span>
          <span class="next-date" id="next-date"></span>
        </div>
        <ul class="prep-list" id="prep-list"></ul>
      </div>
    </section>

    <section>
      <h2>Progress</h2>
      <div class="stats" id="stats"></div>
      <div id="trend"></div>
    </section>

    <section>
      <h2>Repeating Mistakes</h2>
      <ul class="mistakes-list" id="mistakes"></ul>
    </section>

    <section>
      <h2>Common Corrections</h2>
      <div id="corrections"></div>
    </section>

    <section>
      <h2>Sessions</h2>
      <div id="sessions"></div>
    </section>

    <section>
      <h2>Quick Links</h2>
      <ul class="links-list">
        <li><a href="https://github.com/kneil31/english-practice/blob/main/content/common_mistakes.md">Common Mistakes</a></li>
        <li><a href="https://github.com/kneil31/english-practice/blob/main/content/weekly_summary.md">Weekly Summary</a></li>
        <li><a href="https://github.com/kneil31/english-practice/blob/main/content/vocabulary.md">Vocabulary</a></li>
        <li><a href="https://github.com/kneil31/english-practice/blob/main/content/curriculum.md">Curriculum</a></li>
      </ul>
    </section>
  </main>

  <script>
    const BASE = window.location.hostname === 'localhost' || window.location.protocol === 'file:'
      ? '..' : 'https://raw.githubusercontent.com/kneil31/english-practice/main';

    async function load(path) {
      const res = await fetch(`${BASE}/${path}`);
      return res.json();
    }

    function scoreClass(score) {
      if (score >= 4) return 'score-good';
      if (score >= 3) return 'score-ok';
      return 'score-low';
    }

    function renderFocus(config) {
      document.getElementById('focus-text').textContent = config.current_focus;
      document.getElementById('updated').textContent = `Updated ${config.last_updated}`;
    }

    function renderNext(config) {
      const ns = config.next_session;
      document.getElementById('next-label').textContent = `Session ${ns.number}`;
      document.getElementById('next-date').textContent = ns.date;
      document.getElementById('prep-list').innerHTML =
        ns.prep.map(p => `<li>${p}</li>`).join('');
    }

    function renderStats(sessions) {
      const done = sessions.length;
      const total = 25;
      const avg = (sessions.reduce((s, x) => s + x.score, 0) / done).toFixed(1);
      const last = sessions[sessions.length - 1].score;
      const prev = sessions.length > 1 ? sessions[sessions.length - 2].score : last;
      const arrow = last > prev ? '↑' : last < prev ? '↓' : '→';
      const pct = Math.round(done / total * 100);

      document.getElementById('stats').innerHTML = `
        <div class="stat-box">
          <div class="stat-num">${done}<span class="stat-dim">/${total}</span></div>
          <div class="stat-label">Sessions</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${avg}<span class="stat-dim">/5</span></div>
          <div class="stat-label">Average</div>
        </div>
        <div class="stat-box">
          <div class="stat-num">${last}<span class="stat-dim">/5 ${arrow}</span></div>
          <div class="stat-label">Last Score</div>
        </div>
      `;
    }

    function renderTrend(sessions) {
      if (sessions.length < 2) return;
      const w = 600, h = 120, pad = 40;
      const maxScore = 5;
      const n = sessions.length;
      const chartW = w - pad * 2;
      const chartH = h - pad;

      let points = sessions.map((s, i) => {
        const x = pad + (i / Math.max(n - 1, 1)) * chartW;
        const y = pad / 2 + chartH - (s.score / maxScore * chartH);
        return { x, y, score: s.score, session: s.session };
      });

      const pathD = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
      const dots = points.map(p =>
        `<circle cx="${p.x}" cy="${p.y}" r="4" fill="#2563eb"/>
         <text x="${p.x}" y="${p.y - 10}" fill="#666" font-size="11" text-anchor="middle">${p.score}</text>`
      ).join('');
      const labels = points.map(p =>
        `<text x="${p.x}" y="${h - 4}" fill="#bbb" font-size="10" text-anchor="middle">${p.session}</text>`
      ).join('');

      // Grid lines
      let grid = '';
      for (let v = 1; v <= 5; v++) {
        const y = pad / 2 + chartH - (v / maxScore * chartH);
        grid += `<line x1="${pad}" y1="${y}" x2="${w - pad}" y2="${y}" stroke="#eee" stroke-width="1"/>`;
        if (v % 2 === 0 || v === 1 || v === 5) {
          grid += `<text x="${pad - 8}" y="${y + 4}" fill="#ccc" font-size="10" text-anchor="end">${v}</text>`;
        }
      }

      document.getElementById('trend').innerHTML = `
        <svg viewBox="0 0 ${w} ${h}" class="trend-chart">
          ${grid}
          <path d="${pathD}" fill="none" stroke="#2563eb" stroke-width="2" opacity="0.4"/>
          ${dots}
          ${labels}
        </svg>
      `;
    }

    function renderMistakes(config) {
      document.getElementById('mistakes').innerHTML =
        config.repeating_mistakes.map(m => {
          const parts = m.split(' — ');
          return `<li>
            <span class="mistake-name">${parts[0]}</span>
            ${parts[1] ? `<span class="mistake-detail">${parts[1]}</span>` : ''}
          </li>`;
        }).join('');
    }

    function renderCorrections() {
      // Hardcoded common corrections — easy to update manually
      const corrections = [
        { wrong: 'most of the people', right: 'most people', type: 'articles' },
        { wrong: 'has took', right: 'has taken', type: 'grammar' },
        { wrong: 'comes natural', right: 'comes naturally', type: 'grammar' },
        { wrong: 'vicious slope', right: 'slippery slope', type: 'word choice' },
        { wrong: 'people does', right: 'people do', type: 'subject-verb' },
      ];
      document.getElementById('corrections').innerHTML =
        corrections.map(c => `
          <div class="correction">
            <div class="correction-wrong">${c.wrong}</div>
            <div class="correction-right">${c.right}</div>
            <div class="correction-type">${c.type}</div>
          </div>
        `).join('');
    }

    function renderSessions(sessions) {
      // Show completed + next few pending
      let html = '';
      for (let i = 0; i < Math.min(25, Math.max(sessions.length + 3, 5)); i++) {
        const s = sessions[i];
        if (s) {
          const sc = scoreClass(s.score);
          html += `
            <div class="session-row session-done">
              <div class="session-num">${s.session}</div>
              <div class="session-info">
                <div class="session-focus">${s.focus}</div>
                <div class="session-date">${s.date}</div>
                <div class="session-takeaway">${s.takeaway}</div>
              </div>
              <div class="session-score ${sc}">${s.score}</div>
            </div>
          `;
        } else {
          html += `
            <div class="session-row session-pending">
              <div class="session-num">${i + 1}</div>
              <div class="session-info">
                <div class="session-focus">—</div>
              </div>
            </div>
          `;
        }
      }
      document.getElementById('sessions').innerHTML = html;
    }

    async function init() {
      try {
        const [sessions, config] = await Promise.all([
          load('data/sessions.json'),
          load('data/config.json')
        ]);
        renderFocus(config);
        renderNext(config);
        renderStats(sessions);
        renderTrend(sessions);
        renderMistakes(config);
        renderCorrections();
        renderSessions(sessions);
      } catch (e) {
        console.error('Failed to load data:', e);
      }
    }

    init();
  </script>
</body>
</html>
